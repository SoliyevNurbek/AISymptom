<!DOCTYPE html>
<html lang="{{ lang or 'uz_latn' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Alomat Tekshiruvi Demo{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    {% if language_links %}
    <div class="container py-3">
        <div class="d-flex justify-content-end">
            <div class="btn-group" role="group" aria-label="Language switcher">
                {% for item in language_links %}
                <a href="{{ item.url }}" class="btn btn-sm {% if lang == item.code %}btn-primary{% else %}btn-outline-primary{% endif %}">
                    {{ item.label }}
                </a>
                {% endfor %}
            </div>
        </div>
    </div>
    {% endif %}
    {% block content %}{% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.APP_I18N = {
            requiredAlert: {{ ui.required_alert|tojson if ui else '"Please fill in all required fields."' }},
            analyzeBtn: {{ ui.analyze_btn|tojson if ui else '"Analyze symptoms"' }},
            loadingBtn: {{ ui.loading_btn|tojson if ui else '"Analyzing..."' }},
            retryBtn: {{ ui.retry_btn|tojson if ui else '"Try again"' }},
            timeoutAlert: {{ ui.timeout_alert|tojson if ui else '"Request timed out"' }}
        };
    </script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
