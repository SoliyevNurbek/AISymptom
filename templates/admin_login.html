{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<section class="admin-auth-shell">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card admin-auth-card">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <span class="admin-lock-badge"><i class="fas fa-shield-halved"></i></span>
                            <h1 class="h3 mt-3 mb-2">Admin Panel</h1>
                            <p class="text-muted mb-0">Faqat ruxsat berilgan admin kirishi mumkin.</p>
                        </div>

                        {% if error_message %}
                        <div class="alert alert-danger" role="alert">
                            {{ error_message }}
                        </div>
                        {% endif %}

                        <form method="post" class="d-grid gap-3">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <div>
                                <label for="username" class="form-label">Login</label>
                                <input id="username" name="username" type="text" class="form-control" required autocomplete="username">
                            </div>
                            <div>
                                <label for="password" class="form-label">Parol</label>
                                <input id="password" name="password" type="password" class="form-control" required autocomplete="current-password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Kirish</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
